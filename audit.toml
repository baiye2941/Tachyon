# cargo-audit 配置
# 忽略无法主动解决的间接依赖公告,每条 MUST 有原因和依赖链注释
# 与 deny.toml 的 ignore 列表保持一致

[advisories]
ignore = [
    # quick-xml — librqbit-upnp 间接依赖,DoS 漏洞(二次时间复杂度 + 无界 namespace)
    # 仅用于 UPnP 设备描述解析(局域网),非外部用户输入,风险可控
    # 等 librqbit 上游升级 quick-xml
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # gtk-rs GTK3 绑定不再维护(Tauri v2 Linux 依赖,等 v3 迁 GTK4)
    "RUSTSEC-2024-0413",
]
