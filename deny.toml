# cargo-deny 配置
# 参考: https://embarkstudios.github.io/cargo-deny/

[graph]
# 全平台检查
all-features = true

[advisories]
# 使用 RustSec 漏洞数据库
version = 2
# 忽略的已知漏洞/unmaintained 警告
# 策略: 仅 ignore 无法主动解决的间接依赖,每条 MUST 有原因和依赖链注释,
# 并在 librqbit 升级或替换时重新评估
ignore = [
    # M-22: glib unsound (RUSTSEC-2024-0429) — gtk-rs GTK3 绑定不再维护,
    # glib 存在已确认的 unsound 缺陷。Tauri v2 在 Linux 上依赖 GTK3/WebKitGTK,
    # 无法主动解决。等待 Tauri v3 迁移到 GTK4 后移除此条目。
    # 注意: 此条目仅在 Linux 目标构建时生效(Windows/MacOS 依赖树中不含 glib)。
    "RUSTSEC-2024-0429",
    # 以下均为 librqbit 间接依赖,无法主动替换,等 librqbit 上游修复或更换 BT 库:
    # backoff — librqbit 的 HTTP 重试库,已停止维护
    "RUSTSEC-2025-0012",
    # bincode — librqbit 的序列化库,v1/v2 均已停止维护
    "RUSTSEC-2025-0141",
    # crypto-hash — librqbit-sha1-wrapper 依赖,已停止维护,仅用于 BT info_hash
    "RUSTSEC-2025-0060",
    # instant — librqbit 兼容库,Rust 1.59+ 已原生支持,已停止维护
    "RUSTSEC-2024-0384",
    # quick-xml — 两条独立传递链,均命中 RUSTSEC-2026-0194/0195(DoS):
    #   1) librqbit → librqbit-upnp → quick-xml 0.37.x(BT UPnP 设备描述,局域网)
    #   2) Tauri/plist/wayland-scanner 等平台链 → quick-xml 0.39.x
    # 现有 CI 全局 ignore 遮蔽两条链;升级目标均为 quick-xml >=0.41。
    # 在上游升级前保留 ignore,并在 enable_upnp 默认 false 降低 UPnP 暴露面。
    # 审计 A-10:不得再写「仅 librqbit/UPnP」掩盖 Tauri 链。
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # glib — gtk-rs GTK3 绑定,Tauri v2 Linux 依赖,等 v3 迁 GTK4
    "RUSTSEC-2026-0190",
]

[licenses]
version = 2
# 允许的宽松许可证
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    # OpenSSL: rustls 间接相关,保留以避免误报
    "OpenSSL",
    # MPL-2.0: option-ext (dirs-sys/directories 依赖链) 使用。
    # 弱 copyleft,仅修改该 crate 源码时需开源,使用其编译产物不受影响。
    "MPL-2.0",
]
# 对未列出的许可证发出警告而非报错
confidence-threshold = 0.8

[bans]
# 宽松模式:允许重复依赖(Rust 生态常见)
multiple-versions = "warn"
# 设为 warn 而非 deny,因为部分传递依赖可能使用通配符版本
# 通过 dependabot 定期更新依赖版本保持锁定
wildcards = "warn"

[sources]
# 仅允许来自 crates.io 的依赖
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
