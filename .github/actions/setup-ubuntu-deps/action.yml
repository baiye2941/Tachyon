name: Setup Ubuntu deps
description: 安装 Tauri/GTK 系统依赖（仅 Linux；其他 OS 跳过）

runs:
  using: composite
  steps:
    - name: 安装 Ubuntu 系统依赖
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
