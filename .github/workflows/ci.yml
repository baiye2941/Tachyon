name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 最小权限原则:CI 只需要 contents: read
permissions:
  contents: read

# SRE-018: 并发控制,同一分支的新推送自动取消旧运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: 格式检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: 测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - name: 安装系统依赖(Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 安装 cargo-nextest
        run: cargo binstall -y --force --locked cargo-nextest
      - name: 运行测试(nextest, 失败重试 2 次)
        run: cargo nextest run --all --retries 2

  docs:
    name: 文档构建
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 构建文档(零警告)
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    name: 安全审计 (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 安装 cargo-deny (预编译二进制)
        run: cargo binstall -y --force cargo-deny
      - run: cargo deny check
      # SRE-012: 未使用依赖检查
      - name: 安装 cargo-machete
        run: cargo binstall -y --force cargo-machete
      - name: 检查未使用依赖
        run: cargo machete

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 安装 cargo-audit (预编译二进制)
        run: cargo binstall -y --force cargo-audit
      - run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195 --ignore RUSTSEC-2024-0413 --ignore RUSTSEC-2026-0190 --ignore RUSTSEC-2026-0186

  # SRE-013: TOML 格式检查
  taplo:
    name: TOML 格式检查 (taplo)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 安装 taplo
        run: cargo binstall -y --force taplo-cli
      - name: TOML 格式检查
        run: taplo check

  coverage:
    name: 覆盖率检查
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v7
      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: 运行覆盖率检查
        # 覆盖率口径: 排除协议层(需外部网络)、tachyon-app(需 Tauri 运行时)
        # 仅检查核心逻辑 crate 的行覆盖率
        run: |
          cargo llvm-cov -p tachyon-core -p tachyon-engine -p tachyon-store \
            -p tachyon-io -p tachyon-crypto -p tachyon-scheduler \
            --fail-under-lines 90 --summary-only
      - name: 生成覆盖率报告
        if: always()
        run: |
          cargo llvm-cov -p tachyon-core -p tachyon-engine -p tachyon-store \
            -p tachyon-io -p tachyon-crypto -p tachyon-scheduler \
            --html || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/llvm-cov/html/

  miri:
    name: Miri (unsafe 代码检测)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: 初始化 Miri
        run: cargo miri setup
      - name: Miri 检测 tachyon-core
        run: cargo miri test -p tachyon-core --lib -- --skip test_validate_save_path --skip test_validate_multi_save_paths --skip proptests
      - name: Miri 检测 tachyon-io (非平台特定代码)
        run: cargo miri test -p tachyon-io --lib -- --skip iocp --skip iouring --skip pipeline --skip tokio_file --skip winio --skip write_pipeline

  bench:
    name: 性能基准 Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      TACHYON_BENCH_MODE: smoke
    steps:
      - uses: actions/checkout@v7
      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 运行基准 smoke(编译+执行,不做统计采样)
        run: cargo test --benches

  frontend:
    name: 前端检查
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: 安装前端依赖
        working-directory: frontend
        run: bun install
      - name: 前端依赖安全审计
        working-directory: frontend
        run: bun audit --audit-level=high
        # high/critical 漏洞阻断 CI；moderate 仅信息性
      - name: TypeScript 类型检查
        working-directory: frontend
        run: bun run typecheck
      - name: ESLint 检查
        working-directory: frontend
        run: bun run lint
      - name: 前端单元测试
        working-directory: frontend
        run: bun run test
      - name: 前端构建
        working-directory: frontend
        run: bun run build

  ci-pass:
    name: CI 通过
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, clippy, test, docs, audit, cargo-audit, taplo, coverage, miri, bench, frontend]
    steps:
      - name: 检查所有 CI 作业是否成功
        run: |
          jobs="${{ needs.*.result }}"
          for result in $jobs; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::CI 作业失败或被取消: $result"
              exit 1
            fi
          done
          echo "所有 CI 作业通过"
