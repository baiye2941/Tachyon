name: Fuzz

on:
  # H7: 每天凌晨 3 点 UTC 运行(北京时间 11:00)
  schedule:
    - cron: '0 3 * * *'
  # 支持手动触发,便于调试
  workflow_dispatch:

# 最小权限原则:Fuzz 只需要 contents: read
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz 测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 审计 F1:fuzz crash 必须阻断 CI。移除 job 级 continue-on-error,
    # crash 由步骤退出码自然失败。个别 target 失败仍继续后续 target
    # (脚本内 || true),但最终汇总若任一 target crash 则 step 失败。
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v7
      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          # fuzz 是独立 workspace,单独缓存
          workspaces: "fuzz"
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 安装 cargo-fuzz
        run: cargo binstall -y --force cargo-fuzz || cargo install cargo-fuzz
      # H8: corpus 持久化 —— 跨 fuzz 运行复用 corpus,让覆盖率随时间积累。
      # cargo-fuzz 默认把 corpus 存到 fuzz/corpus/<target>/,artifact 只保存 crash。
      # 缓存 key 用日期,每天首次运行重建(避免无限增长);restore-key 跨天复用。
      - name: 恢复 corpus 缓存
        uses: actions/cache@v4
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-
      - name: 运行 fuzz target
        working-directory: fuzz
        run: |
          set +e
          crash=0
          for target in config_parse file_metadata http_headers ipc_deserialize magnet_parse url_safety; do
            echo "::group::Fuzz target: $target"
            # 每个 target 运行 60 秒;crash 不中断后续 target,但记录失败
            if ! cargo fuzz run "$target" -- -max_total_time=60; then
              echo "::error::Fuzz target $target crashed"
              crash=1
            fi
            echo "::endgroup::"
          done
          exit $crash
      - name: 上传 crash artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 30
