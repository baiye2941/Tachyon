name: Fuzz

on:
  # H7: 每天凌晨 3 点 UTC 运行(北京时间 11:00)
  schedule:
    - cron: '0 3 * * *'
  # 支持手动触发,便于调试
  workflow_dispatch:

# 最小权限原则:Fuzz 只需要 contents: read
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz 测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Fuzz 是探索性测试,crash 不应阻断 CI
    continue-on-error: true
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v7
      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          # fuzz 是独立 workspace,单独缓存
          workspaces: "fuzz"
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 安装 cargo-fuzz
        run: cargo binstall -y --force cargo-fuzz || cargo install cargo-fuzz
      - name: 运行 fuzz target
        working-directory: fuzz
        run: |
          for target in config_parse file_metadata http_headers ipc_deserialize magnet_parse url_safety; do
            echo "::group::Fuzz target: $target"
            # 每个 target 运行 60 秒,crash 不中断后续 target
            cargo fuzz run "$target" -- -max_total_time=60 || true
            echo "::endgroup::"
          done
      - name: 上传 crash artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 30
