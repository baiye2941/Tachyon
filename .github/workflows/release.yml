name: Release

on:
  push:
    tags:
      - 'v*'
  # 手动触发:支持不打 tag 干跑构建(不上传 Release),便于调试 release.yml
  # 避免反复"打 tag → 失败 → 修 → 再打 tag"的低效循环
  workflow_dispatch:
    inputs:
      dry-run:
        description: '干跑模式(跳过 Release 上传,仅验证构建)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# 并发控制:同一 ref 的 release 不可并发(避免产物混乱)。
# tag 推送不可取消(cancel-in-progress: false),保护正在进行的构建。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# 默认只读；写权限仅在 build / publish / rollback 提升
permissions:
  contents: read

# DRY_RUN: workflow_dispatch 且 dry-run != false 时为 true（默认 dry-run=true）
# 注意: job 级 if 不能读 env 上下文,发布/回滚条件用 github.event_name + inputs 表达式
env:
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run != 'false' }}

jobs:
  # I-boundary: workflow_dispatch + dry-run=false 必须在 tag 上，禁止无 tag 真发布
  guard:
    name: 发布边界检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 校验 dry-run=false 仅允许 tag
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == 'false'
        run: |
          set -euo pipefail
          ref="${{ github.ref }}"
          if [[ "$ref" != refs/tags/v* ]]; then
            echo "::error::workflow_dispatch + dry-run=false 要求 ref 为 refs/tags/v*（当前: $ref）"
            exit 1
          fi
          echo "边界检查通过: $ref dry-run=false"

      - name: 干跑/tag 路径说明
        run: |
          echo "event=${{ github.event_name }} ref=${{ github.ref }} dry-run=${{ inputs.dry-run || 'n/a' }}"

  # 同 SHA CI 绿门禁：优先查最近 14 天内同 commit 的 CI workflow 成功记录
  # 禁止只看“main 最近一次绿”。找不到则 fallback 本地重跑关键门禁。
  verify-ci-green:
    name: 校验同 SHA CI 通过
    needs: [guard]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ci_green: ${{ steps.check.outputs.ci_green }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: 查找同 SHA 的成功 CI 运行
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # 查询该 SHA 上名为 CI 的 workflow runs；取 conclusion=success 且 14 天内
          # 优先匹配 job 名「CI 通过」，找不到则接受 workflow 级 success
          # API 失败 → 安全 fallback 重跑门禁（禁止只看 main 最近绿）
          cutoff=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-14d +%Y-%m-%dT%H:%M:%SZ)
          echo "查找 SHA=$SHA 自 $cutoff 以来的成功 CI 运行"

          if ! json=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/runs?head_sha=${SHA}&per_page=50" \
            --jq "[.workflow_runs[] | select(.name==\"CI\" and .conclusion==\"success\" and .created_at >= \"${cutoff}\")] | .[0] // empty"); then
            echo "gh api 查询失败 → fallback"
            echo "ci_green=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$json" || "$json" == "null" ]]; then
            echo "未找到同 SHA 的成功 CI 运行（14 天内）→ 将 fallback"
            echo "ci_green=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id=$(printf '%s' "$json" | jq -r '.id')
          run_url=$(printf '%s' "$json" | jq -r '.html_url')
          echo "找到 CI run id=$run_id url=$run_url"

          # 尽量确认「CI 通过」job 成功（兼容 path-filter 导致部分 job skipped）
          if jobs_json=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/runs/${run_id}/jobs?per_page=100"); then
            pass_job=$(printf '%s' "$jobs_json" | jq -r '
              [.jobs[] | select(.name=="CI 通过" and .conclusion=="success")] | length')
            if [[ "$pass_job" -ge 1 ]]; then
              echo "「CI 通过」job 成功"
              echo "ci_green=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          # workflow conclusion 已是 success；若无该 job 名仍接受（旧流水线）
          echo "未找到「CI 通过」job，但 workflow conclusion=success，接受"
          echo "ci_green=true" >> "$GITHUB_OUTPUT"

  # fallback: 同 SHA 无绿 CI 时重跑关键门禁（SSOT 脚本，禁止内嵌第二套 skip）
  ci-fallback:
    name: CI 门禁回退
    needs: [verify-ci-green]
    if: needs.verify-ci-green.outputs.ci_green != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ubuntu-deps
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: rustfmt, clippy
          shared-key: ubuntu-stable-${{ hashFiles('**/Cargo.lock') }}
          cache-key-suffix: release-fallback
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 格式检查
        run: cargo fmt --all -- --check
      - name: Clippy 零告警
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: 安装 cargo-nextest
        run: cargo binstall -y --force cargo-nextest
      - name: 运行测试(nextest, 失败重试 2 次)
        run: cargo nextest run --all --locked --retries 2
      - name: 文档构建(零警告)
        run: cargo doc --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: -D warnings
      - name: 安装 cargo-deny / cargo-audit
        run: |
          cargo binstall -y --force cargo-deny
          cargo binstall -y --force cargo-audit
      - name: 安全审计 (SSOT)
        run: bash scripts/ci/audit.sh
      # 签名配置硬门禁：PLACEHOLDER / 缺 cosign 配置必须失败
      - name: 签名配置检查（硬失败）
        run: bash .github/scripts/verify-signature-config.sh
      - name: 安装 nightly 工具链(覆盖率)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: 覆盖率检查 (SSOT)
        run: bash scripts/ci/coverage.sh
        env:
          RUSTUP_TOOLCHAIN: nightly
      - name: 安装 nightly 工具链(Miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Miri 检测 (SSOT)
        run: bash scripts/ci/miri.sh
        env:
          RUSTUP_TOOLCHAIN: nightly
      - uses: ./.github/actions/setup-bun
      - name: 前端依赖
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: 前端依赖安全审计
        working-directory: frontend
        run: bun audit --audit-level=high
      - name: TypeScript 类型检查
        working-directory: frontend
        run: bun run typecheck
      - name: ESLint 检查
        working-directory: frontend
        run: bun run lint
      - name: 前端单元测试
        working-directory: frontend
        run: bun run test
      - name: 前端构建
        working-directory: frontend
        run: bun run build

  # 聚合：同 SHA 绿 或 fallback 成功
  ci-gate:
    name: CI 门禁汇总
    needs: [verify-ci-green, ci-fallback]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 确认门禁
        run: |
          set -euo pipefail
          green="${{ needs.verify-ci-green.outputs.ci_green }}"
          fallback="${{ needs.ci-fallback.result }}"
          echo "ci_green=$green fallback=$fallback"
          if [[ "$green" == "true" ]]; then
            echo "同 SHA CI 已绿，跳过 fallback"
            exit 0
          fi
          if [[ "$fallback" == "success" ]]; then
            echo "fallback 门禁通过"
            exit 0
          fi
          if [[ "$fallback" == "skipped" ]]; then
            echo "::error::ci_green=false 且 fallback 被跳过"
            exit 1
          fi
          echo "::error::CI 门禁失败: ci_green=$green fallback=$fallback"
          exit 1

  # 版本一致性检查
  # tag 推送: 比 tag vs Cargo/tauri/frontend
  # workflow_dispatch: 只比三文件互相同（不把 GITHUB_REF 当版本）
  version-check:
    name: 版本一致性检查
    needs: [guard]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: 检查版本一致性
        # SSOT: scripts/ci/version-check.sh
        # tag push → tag 模式；dispatch/其他 → files 模式（auto 亦可，显式更清晰）
        run: bash scripts/ci/version-check.sh ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'tag' || 'files' }}

  # 安装冒烟测试:验证构建产物可安装且二进制可执行
  # 注意: Tauri GUI 应用需要 display server,CI 无头环境无法验证窗口启动,
  # 因此仅验证安装文件存在且非零大小,以及 CLI --version 可用(如果支持)
  install-smoke:
    name: 安装冒烟测试 (${{ matrix.platform }})
    needs: build-release
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 10
    # 审计 SEC-013:产物存在/本平台包结构为硬门禁;不再 job 级 continue-on-error
    steps:
      - uses: actions/checkout@v7

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          # tauri-action 的 artifact 命名为 platform-arch-type(如 windows-x64-msi),
          # 无统一前缀,不指定 pattern 下载全部,再按平台过滤验证
          path: dist
          merge-multiple: true

      - name: 验证产物存在且非零大小(硬性要求)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== 构建产物列表 ==="
          find dist -type f -ls 2>/dev/null || ls -laR dist/

          # SEC-013: 全局至少有一个安装包;本平台类型在后续 step 再硬校验
          found=0
          for ext in msi deb dmg AppImage; do
            files=$(find dist -name "*.$ext" -size +0c 2>/dev/null || true)
            if [ -n "$files" ]; then
              echo "找到 $ext 安装包: $files"
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::未找到非零大小的安装包,构建产物缺失或损坏"
            exit 1
          fi

      - name: Windows 本平台产物与结构验证(硬性)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) {
            Write-Error "SEC-013: 未找到非零 MSI 安装包"
            exit 1
          }
          if ($msi.Length -le 0) {
            Write-Error "SEC-013: MSI 文件大小为 0: $($msi.FullName)"
            exit 1
          }
          Write-Host "找到 MSI: $($msi.FullName) ($($msi.Length) bytes)"
          $target = Join-Path $env:RUNNER_TEMP "msi-validate"
          $p = Start-Process -FilePath "msiexec.exe" -ArgumentList @("/a", $msi.FullName, "/qn", "TARGETDIR=$target") -Wait -PassThru
          if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
            Write-Error "SEC-013: MSI 管理安装失败,exit=$($p.ExitCode)"
            exit 1
          }
          $exe = Get-ChildItem -Path $target -Filter "tachyon*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Error "SEC-013: 管理安装结果中未找到 tachyon 可执行文件"
            exit 1
          }
          Write-Host "找到可执行文件: $($exe.FullName)"

      - name: Linux 本平台产物与结构验证(硬性)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          deb=$(find dist -name "*.deb" -size +0c 2>/dev/null | head -1 || true)
          appimage=$(find dist -name "*.AppImage" -size +0c 2>/dev/null | head -1 || true)
          if [ -z "$deb" ] && [ -z "$appimage" ]; then
            echo "::error::SEC-013: 未找到非零 DEB/AppImage 安装包"
            exit 1
          fi
          if [ -n "$deb" ]; then
            echo "验证 DEB: $deb"
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb" | head -50
            if ! dpkg-deb --contents "$deb" | grep -Eiq 'tachyon|usr/bin|usr/lib'; then
              echo "::error::SEC-013: DEB 内容异常,未见应用入口线索"
              exit 1
            fi
            echo "DEB 包结构验证通过"
          fi
          if [ -n "$appimage" ]; then
            echo "验证 AppImage: $appimage"
            chmod +x "$appimage"
            if ! "$appimage" --appimage-help >/tmp/appimage-help.txt 2>&1; then
              echo "::warning::AppImage --appimage-help 失败(可能缺 FUSE),已确认文件非零且可 chmod"
              head -5 /tmp/appimage-help.txt || true
            else
              head -5 /tmp/appimage-help.txt
              echo "AppImage help 验证通过"
            fi
          fi

      - name: macOS 本平台产物与结构验证(硬性)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          dmg=$(find dist -name "*.dmg" -size +0c 2>/dev/null | head -1 || true)
          if [ -z "$dmg" ]; then
            echo "::error::SEC-013: 未找到非零 DMG 安装包"
            exit 1
          fi
          echo "验证 DMG: $dmg"
          hdiutil imageinfo "$dmg" | head -20
          echo "DMG 镜像信息验证通过"

  # 发布门禁:所有检查(含安装冒烟)通过后才将 draft release 变为 public
  release-gate:
    name: 发布门禁
    needs: [install-smoke]
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 发布门禁通过
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN_INPUT: ${{ inputs.dry-run || 'n/a' }}
        run: |
          set -euo pipefail
          echo "所有门禁检查通过:"
          echo "  - 同 SHA CI 绿 / fallback 全量门禁"
          echo "  - 版本一致性检查"
          echo "  - 安装冒烟测试"
          echo "event=$EVENT_NAME dry-run=$DRY_RUN_INPUT"
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$DRY_RUN_INPUT" != "false" ]]; then
            echo "干跑模式: 不 undraft / 不公开发布"
          else
            echo "正式路径: 后续 publish-release 会将 draft 变为 public"
          fi

  # 发布失败时自动回滚:
  # - 若仍是 draft: 保持 draft 并标 prerelease（尽量不扩大分发面）
  # - 若已 public: 尝试重新 draft；失败则 delete release（禁止仅 prerelease 当安全回滚）
  # dry-run 不创建 public/draft 副作用路径上的回滚；tag 推送与 dry-run=false 仍回滚
  # 覆盖 publish-release，避免「已 public 后失败却无人回滚」
  rollback-on-failure:
    name: 发布回滚
    # always() 防止 needs 中 skipped job 导致本 job 被静默跳过
    if: >-
      always()
      && (needs.build-release.result == 'failure'
          || needs.install-smoke.result == 'failure'
          || needs.publish-release.result == 'failure')
      && (github.event_name != 'workflow_dispatch' || inputs.dry-run == 'false')
    needs: [build-release, install-smoke, publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: 回滚 Release（draft / re-draft / delete）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ -z "$TAG" || "$TAG" == "$GITHUB_REF" && "$GITHUB_REF" != refs/tags/* ]]; then
            # 非 tag 路径（异常）
            TAG="${GITHUB_REF_NAME:-}"
          fi
          TAG="${TAG#refs/tags/}"
          echo "发布流程失败,尝试回滚 release: $TAG"

          if ! gh release view "$TAG" --repo "$REPO" >/tmp/release-meta.json 2>/dev/null; then
            echo "::warning::Release $TAG 不存在,无需回滚(可能门禁阶段失败前未创建 release)"
            exit 0
          fi

          is_draft=$(gh release view "$TAG" --repo "$REPO" --json isDraft --jq '.isDraft')
          is_prerelease=$(gh release view "$TAG" --repo "$REPO" --json isPrerelease --jq '.isPrerelease')
          echo "当前状态: isDraft=$is_draft isPrerelease=$is_prerelease"

          if [[ "$is_draft" == "true" ]]; then
            # 仍是 draft: 标 prerelease 并保持 draft
            gh release edit "$TAG" --draft --prerelease --repo "$REPO" || true
            echo "已保持 draft 并标记 prerelease: $TAG"
            exit 0
          fi

          # 已 public: 优先重新 draft；gh 若不支持 undraft→draft，则删除 release
          if gh release edit "$TAG" --draft --prerelease --repo "$REPO" 2>/tmp/re-draft.err; then
            echo "已将 public release 重新 draft 并标记 prerelease: $TAG"
            exit 0
          fi

          echo "::warning::无法 re-draft，尝试删除 release 以停止分发"
          cat /tmp/re-draft.err || true
          if gh release delete "$TAG" --yes --repo "$REPO"; then
            echo "已删除 release: $TAG（请发安全通告并重新打 tag）"
          else
            echo "::error::回滚失败: 既不能 re-draft 也不能 delete。请立即手动处理 $TAG"
            exit 1
          fi

      - name: 输出回滚说明
        if: always()
        run: |
          echo "========================================"
          echo "发布回滚报告"
          echo "========================================"
          echo "Tag: ${GITHUB_REF#refs/tags/}"
          echo "策略: draft 保持 draft+prerelease; 已 public 则 re-draft 或 delete"
          echo ""
          echo "后续步骤:"
          echo "1. 检查失败的 job 日志,定位问题"
          echo "2. 修复问题后推送新 tag 或重新运行 workflow"
          echo "3. 若 release 被 delete,需重新打 tag 发布"
          echo "========================================"

  # 构建 release 产物
  build-release:
    name: 构建发布 (${{ matrix.platform }})
    needs: [ci-gate, version-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          # macos-13(Intel)runner 常年 queued 超时,仅保留 macos-latest(Apple Silicon)
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60  # 跨平台 Tauri LTO 编译可能 40-60min,防止挂起耗尽 runner 分钟
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-ubuntu-deps

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          shared-key: ${{ runner.os == 'Linux' && format('ubuntu-stable-{0}', hashFiles('**/Cargo.lock')) || format('{0}-stable-{1}', runner.os, hashFiles('**/Cargo.lock')) }}
          cache-key-suffix: release-build

      - uses: ./.github/actions/setup-bun

      - name: 安装前端依赖
        working-directory: frontend
        run: bun install --frozen-lockfile

      # 构建前硬校验签名 secret 与配置（禁止私钥缺失软跳过）
      - name: 校验 Tauri 签名密钥与配置
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          bash .github/scripts/verify-signature-config.sh
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "::error::缺少 secret TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]]; then
            echo "::error::缺少 secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            exit 1
          fi
          echo "Tauri 签名密钥 secret 已配置"

      # dry-run: 故意不设 tagName/releaseName — tauri-action 仅构建 + workflow artifacts，
      # 不创建 GitHub Release，避免污染 draft。
      # 参考: https://github.com/tauri-apps/tauri-action examples/test-build-only.yml
      - name: 构建 Tauri (dry-run, 不创建 Release)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run != 'false'
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/tachyon-app
          uploadWorkflowArtifacts: true

      # tag 推送 或 workflow_dispatch dry-run=false: 创建 draft Release + workflow artifacts
      - name: 构建 Tauri 并上传 draft Release
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == 'false'
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SEC-013: Tauri updater ed25519 签名(私钥在 GH secret；缺失必须在前序 step 失败)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tachyon ${{ github.ref_name }}'
          releaseBody: |
            ## Tachyon ${{ github.ref_name }}

            ### 安装
            下载对应平台的安装包：
            - **Windows**: `.msi` 安装包
            - **macOS**: `.dmg` 安装包
            - **Linux**: `.deb` / `.AppImage`

            ### 变更
            详见 Git 历史、CHANGELOG 与 PR 描述。

            ### 校验
            - 安装包附带 `.sha256` 与 cosign keyless `.bundle`
            - Tauri updater 附带 `.sig`（ed25519）
          releaseDraft: true
          prerelease: false
          projectPath: crates/tachyon-app
          # 产物同时作为 workflow artifact 上传,供后续 install-smoke / publish-release
          # 通过 actions/download-artifact 下载。默认 false 时产物只上传到 Release,
          # 后续 job 用 download-artifact pattern: tachyon-* 会下载到 0 个文件。
          uploadWorkflowArtifacts: true

      # 私钥缺失时 tauri-action 可能静默跳过 .sig — 构建后硬断言
      - name: 硬断言 Tauri updater .sig 已生成
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t SIGS < <(find . -type f -name '*.sig' 2>/dev/null | LC_ALL=C sort || true)
          echo "找到 ${#SIGS[@]} 个 .sig 文件"
          printf '  %s\n' "${SIGS[@]:-}"
          if [[ ${#SIGS[@]} -lt 1 ]]; then
            echo "::error::未生成任何 .sig（检查 TAURI_SIGNING_PRIVATE_KEY 与 createUpdaterArtifacts）"
            exit 1
          fi

  # 所有平台构建完成且门禁通过后,将 draft release 发布为 public
  publish-release:
    name: 发布 Release
    needs: [release-gate]
    # dry-run=true(默认)跳过公开发布; tag 推送 或 显式 dry-run=false 才 undraft
    # 注意: job 级 if 不能用 env 上下文,故内联等价表达式
    if: success() && (github.event_name != 'workflow_dispatch' || inputs.dry-run == 'false')
    runs-on: ubuntu-latest
    # 含 cosign + Release 资产对账下载/上传 sidecar，5min 偏紧
    timeout-minutes: 15
    # 发布环境：可在仓库 Settings → Environments 配置审批人
    environment: release-production
    permissions:
      contents: write
      # SEC-013: cosign keyless 需 OIDC token 签发权限
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          # tauri-action 的 artifact 命名为 platform-arch-type(如 windows-x64-msi),
          # 无统一前缀,不指定 pattern 下载全部
          path: dist
          merge-multiple: true

      # SEC-013: sigstore cosign keyless 签名(零密钥管理,GH OIDC → Fulcio 短期证书)
      - name: 安装 cosign
        uses: sigstore/cosign-installer@v3

      # SSOT: scripts/ci/sign-release-artifacts.sh
      # 递归 find(msi/deb/dmg/AppImage) + SHA256 + cosign + 硬断言数量一致
      # RECONCILE_TAG: 与 draft Release 资产字节对账，避免 artifact 布局与用户下载物不一致
      - name: 签名产物(递归 find + 硬断言 + Release 对账)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: 1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DIST_DIR: dist
          RECONCILE_TAG: ${{ github.ref_name }}
        run: bash scripts/ci/sign-release-artifacts.sh

      - name: 上传签名与校验文件到 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # 与 sign 脚本同一套扩展
          mapfile -t PKGS < <(
            find dist -type f -size +0c \( \
              -name '*.msi' -o -name '*.deb' -o -name '*.dmg' -o -name '*.AppImage' \
            \) | LC_ALL=C sort
          )
          mapfile -t SIDECARS < <(
            find dist -type f \( -name '*.sha256' -o -name '*.bundle' \) | LC_ALL=C sort
          )
          mapfile -t SIGS < <(
            find dist -type f -name '*.sig' | LC_ALL=C sort
          )
          pkg_n=${#PKGS[@]}
          side_n=${#SIDECARS[@]}
          sig_n=${#SIGS[@]}
          echo "packages=$pkg_n sidecars=$side_n sigs=$sig_n"
          [[ "$pkg_n" -ge 1 ]] || { echo "::error::无安装包"; exit 1; }
          # 每个包应有 .sha256 + .bundle → 2N
          expect=$((pkg_n * 2))
          if [[ "$side_n" -ne "$expect" ]]; then
            echo "::error::sidecar 数量($side_n) != 2 * 产物数($expect)"
            printf '  pkg: %s\n' "${PKGS[@]}"
            printf '  side: %s\n' "${SIDECARS[@]}"
            exit 1
          fi
          if [[ "$sig_n" -lt 1 ]]; then
            echo "::error::dist 中无 .sig（updater 签名缺失）"
            exit 1
          fi
          for s in "${SIDECARS[@]}" "${SIGS[@]}"; do
            # 审计 SEC-013: 校验/签名上传失败必须阻断公开发布
            # 使用 path#basename 降低嵌套路径上传时 basename 撞名风险
            base=$(basename "$s")
            gh release upload "$TAG" "${s}#${base}" --repo "${{ github.repository }}" --clobber
            echo "已上传: $s -> $base"
          done

      - name: 生成并上传 SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p sbom
          # Cargo SBOM（cyclonedx JSON via cargo-cyclonedx 或简易 cargo tree）
          if command -v cargo >/dev/null 2>&1; then
            cargo install cargo-cyclonedx --locked -q 2>/dev/null || cargo binstall -y cargo-cyclonedx 2>/dev/null || true
          fi
          if command -v cargo-cyclonedx >/dev/null 2>&1 || cargo cyclonedx -h >/dev/null 2>&1; then
            cargo cyclonedx -f json --all 2>/dev/null || cargo cyclonedx --format json 2>/dev/null || true
            # collect possible outputs
            find . -maxdepth 3 -name 'bom*.json' -o -name '*cyclonedx*.json' 2>/dev/null | head -5 | while read -r f; do
              cp "$f" "sbom/$(basename "$f")" || true
            done
          fi
          # 始终生成可复现的依赖清单兜底
          cargo tree --workspace --locked --prefix none 2>/dev/null | sort -u > sbom/cargo-tree.txt || true
          if [[ -f frontend/bun.lock ]]; then
            cp frontend/bun.lock sbom/frontend-bun.lock
          fi
          {
            echo "# Tachyon ${TAG} SBOM"
            echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "commit=${GITHUB_SHA}"
            ls -la sbom/
          } > sbom/README.txt
          # 至少有 cargo-tree 或 lock
          [[ -s sbom/cargo-tree.txt || -s sbom/frontend-bun.lock ]] || {
            echo "::error::SBOM 生成失败"
            exit 1
          }
          # cosign 签名 SBOM 目录内文件
          for f in sbom/*; do
            [[ -f "$f" ]] || continue
            sha256sum "$f" | tee "$f.sha256"
            cosign sign-blob --yes --bundle "$f.bundle" "$f" || {
              echo "::warning::cosign SBOM 签名失败: $f"
            }
          done
          for f in sbom/*; do
            [[ -f "$f" ]] || continue
            base=$(basename "$f")
            gh release upload "$TAG" "${f}#sbom-${base}" --repo "${{ github.repository }}" --clobber
          done
          echo "SBOM 已上传"

      - name: 将 draft release 发布为 public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          echo "所有平台构建完成,发布 release $TAG"
          gh release edit "$TAG" --draft=false --repo "${{ github.repository }}"
          echo "Release $TAG 已公开发布"
