name: Release

on:
  push:
    tags:
      - 'v*'
  # 手动触发:支持不打 tag 干跑构建(不上传 Release),便于调试 release.yml
  # 避免反复"打 tag → 失败 → 修 → 再打 tag"的低效循环
  workflow_dispatch:
    inputs:
      dry-run:
        description: '干跑模式(跳过 Release 上传,仅验证构建)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# 并发控制:同一 ref 的 release 不可并发(避免产物混乱)。
# tag 推送不可取消(cancel-in-progress: false),保护正在进行的构建。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# tauri-action 需要创建 Release 和上传产物,需要 contents: write 权限
# 默认 GITHUB_TOKEN 只有只读权限,会导致 "Resource not accessible by integration"
permissions:
  contents: write

jobs:
  # 完整 CI 门禁: release 必须在所有 CI 检查通过后才能构建
  ci-gate:
    name: CI 门禁检查
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@v1.20.0

      - name: 格式检查
        run: cargo fmt --all -- --check

      - name: Clippy 零告警
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: 安装 cargo-nextest
        run: cargo binstall -y --force cargo-nextest

      - name: 运行测试(nextest, 失败重试 2 次)
        run: cargo nextest run --all --locked --retries 2

      - name: 文档构建(零警告)
        run: cargo doc --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: -D warnings

      # SRE-001: 覆盖率检查门禁
      - name: 安装 nightly 工具链(覆盖率)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: 运行覆盖率检查(核心 crate 逐 crate >= 90%)
        # SSOT: scripts/ci/coverage.sh（逐 crate + --fail-under-regions 90）
        run: bash scripts/ci/coverage.sh

      # SRE-002: Miri 检查门禁
      # 注意:Miri 组件只在 nightly 可用,必须设置 RUSTUP_TOOLCHAIN=nightly
      # 否则 cargo miri setup 会用 stable 报错 "miri component not available"
      # SSOT: scripts/ci/miri.sh（含 dir_sync，与 CI 同源）
      - name: 安装 nightly 工具链(Miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Miri 检测
        run: bash scripts/ci/miri.sh
        env:
          RUSTUP_TOOLCHAIN: nightly

  # 安全审计门禁
  security-gate:
    name: 安全审计门禁
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 安装 cargo-deny
        run: cargo binstall -y --force cargo-deny
      - name: 安装 cargo-audit
        run: cargo binstall -y --force cargo-audit
      # SSOT: scripts/ci/audit.sh — ignore 从 deny.toml 解析，再 cargo audit + cargo deny
      - name: cargo audit + deny 检查
        run: bash scripts/ci/audit.sh

  # 前端门禁
  frontend-gate:
    name: 前端构建门禁
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: 安装前端依赖
        working-directory: frontend
        run: bun install
      # SRE-003: 前端安全审计门禁
      # 使用 bun audit(项目用 bun 管理依赖,无 package-lock.json,
      # npm audit 会因 ENOLOCK 失败)。与 ci.yml 的前端审计命令保持一致。
      - name: 前端依赖安全审计
        working-directory: frontend
        run: bun audit --audit-level=high
      - name: TypeScript 类型检查
        working-directory: frontend
        run: bun run typecheck
      - name: ESLint 检查
        working-directory: frontend
        run: bun run lint
      - name: 前端单元测试
        working-directory: frontend
        run: bun run test
      - name: 前端构建
        working-directory: frontend
        run: bun run build

  # 版本一致性检查
  version-check:
    name: 版本一致性检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: 检查 tag 与各配置文件版本一致
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag 版本: ${TAG_VERSION}"

          # Cargo.toml workspace version
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "Cargo.toml 版本: ${CARGO_VERSION}"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Cargo.toml 版本不一致: tag=v${TAG_VERSION}, Cargo.toml=${CARGO_VERSION}"
            exit 1
          fi

          # tauri.conf.json version
          TAURI_VERSION=$(grep '"version"' crates/tachyon-app/tauri.conf.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "tauri.conf.json 版本: ${TAURI_VERSION}"
          if [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::tauri.conf.json 版本不一致: tag=v${TAG_VERSION}, tauri.conf.json=${TAURI_VERSION}"
            exit 1
          fi

          # frontend/package.json version
          FRONTEND_VERSION=$(grep '"version"' frontend/package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "frontend/package.json 版本: ${FRONTEND_VERSION}"
          if [ "$TAG_VERSION" != "$FRONTEND_VERSION" ]; then
            echo "::error::frontend/package.json 版本不一致: tag=v${TAG_VERSION}, package.json=${FRONTEND_VERSION}"
            exit 1
          fi

          echo "所有版本一致: ${TAG_VERSION}"

  # 安装冒烟测试:验证构建产物可安装且二进制可执行
  # 注意: Tauri GUI 应用需要 display server,CI 无头环境无法验证窗口启动,
  # 因此仅验证安装文件存在且非零大小,以及 CLI --version 可用(如果支持)
  install-smoke:
    name: 安装冒烟测试 (${{ matrix.platform }})
    needs: build-release
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 10
    # 审计 SEC-013:产物存在/本平台包结构为硬门禁;不再 job 级 continue-on-error
    steps:
      - uses: actions/checkout@v7

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          # tauri-action 的 artifact 命名为 platform-arch-type(如 windows-x64-msi),
          # 无统一前缀,不指定 pattern 下载全部,再按平台过滤验证
          path: dist
          merge-multiple: true

      - name: 验证产物存在且非零大小(硬性要求)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== 构建产物列表 ==="
          find dist -type f -ls 2>/dev/null || ls -laR dist/

          # SEC-013: 全局至少有一个安装包;本平台类型在后续 step 再硬校验
          found=0
          for ext in msi deb dmg AppImage; do
            files=$(find dist -name "*.$ext" -size +0c 2>/dev/null || true)
            if [ -n "$files" ]; then
              echo "找到 $ext 安装包: $files"
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::未找到非零大小的安装包,构建产物缺失或损坏"
            exit 1
          fi

      - name: Windows 本平台产物与结构验证(硬性)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) {
            Write-Error "SEC-013: 未找到非零 MSI 安装包"
            exit 1
          }
          if ($msi.Length -le 0) {
            Write-Error "SEC-013: MSI 文件大小为 0: $($msi.FullName)"
            exit 1
          }
          Write-Host "找到 MSI: $($msi.FullName) ($($msi.Length) bytes)"
          $target = Join-Path $env:RUNNER_TEMP "msi-validate"
          $p = Start-Process -FilePath "msiexec.exe" -ArgumentList @("/a", $msi.FullName, "/qn", "TARGETDIR=$target") -Wait -PassThru
          if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
            Write-Error "SEC-013: MSI 管理安装失败,exit=$($p.ExitCode)"
            exit 1
          }
          $exe = Get-ChildItem -Path $target -Filter "tachyon*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Error "SEC-013: 管理安装结果中未找到 tachyon 可执行文件"
            exit 1
          }
          Write-Host "找到可执行文件: $($exe.FullName)"

      - name: Linux 本平台产物与结构验证(硬性)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          deb=$(find dist -name "*.deb" -size +0c 2>/dev/null | head -1 || true)
          appimage=$(find dist -name "*.AppImage" -size +0c 2>/dev/null | head -1 || true)
          if [ -z "$deb" ] && [ -z "$appimage" ]; then
            echo "::error::SEC-013: 未找到非零 DEB/AppImage 安装包"
            exit 1
          fi
          if [ -n "$deb" ]; then
            echo "验证 DEB: $deb"
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb" | head -50
            if ! dpkg-deb --contents "$deb" | grep -Eiq 'tachyon|usr/bin|usr/lib'; then
              echo "::error::SEC-013: DEB 内容异常,未见应用入口线索"
              exit 1
            fi
            echo "DEB 包结构验证通过"
          fi
          if [ -n "$appimage" ]; then
            echo "验证 AppImage: $appimage"
            chmod +x "$appimage"
            if ! "$appimage" --appimage-help >/tmp/appimage-help.txt 2>&1; then
              echo "::warning::AppImage --appimage-help 失败(可能缺 FUSE),已确认文件非零且可 chmod"
              head -5 /tmp/appimage-help.txt || true
            else
              head -5 /tmp/appimage-help.txt
              echo "AppImage help 验证通过"
            fi
          fi

      - name: macOS 本平台产物与结构验证(硬性)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          dmg=$(find dist -name "*.dmg" -size +0c 2>/dev/null | head -1 || true)
          if [ -z "$dmg" ]; then
            echo "::error::SEC-013: 未找到非零 DMG 安装包"
            exit 1
          fi
          echo "验证 DMG: $dmg"
          hdiutil imageinfo "$dmg" | head -20
          echo "DMG 镜像信息验证通过"

  # 发布门禁:  # 发布门禁:所有检查(含安装冒烟)通过后才将 draft release 变为 public
  release-gate:
    name: 发布门禁
    needs: [install-smoke]
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 发布门禁通过
        run: |
          echo "所有门禁检查通过:"
          echo "  - CI 门禁 (格式/Clippy/测试/覆盖率/Miri)"
          echo "  - 安全审计门禁 (deny/audit)"
          echo "  - 前端构建门禁 (类型检查/Lint/测试/构建)"
          echo "  - 版本一致性检查"
          echo "  - 安装冒烟测试"
          echo ""
          echo "Release 将从 draft 变为 public"

  # 发布失败时自动回滚:将当前 release 标记为 pre-release
  rollback-on-failure:
    name: 发布回滚
    if: failure()
    needs: [build-release, install-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 标记当前 release 为 pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "发布流程失败,将 release $TAG 标记为 pre-release"
          # release 可能尚未创建(如门禁阶段失败),容错处理
          gh release edit "$TAG" --prerelease --repo "${{ github.repository }}" || \
            echo "::warning::Release $TAG 不存在,无需回滚(可能门禁阶段失败前未创建 release)"

      - name: 输出回滚说明
        run: |
          echo "========================================"
          echo "发布回滚报告"
          echo "========================================"
          echo "Tag: ${GITHUB_REF#refs/tags/}"
          echo "状态: 已标记为 pre-release"
          echo ""
          echo "后续步骤:"
          echo "1. 检查失败的 job 日志,定位问题"
          echo "2. 修复问题后推送新 tag 或重新运行 workflow"
          echo "3. 验证通过后,手动取消 pre-release 标记:"
          echo "   gh release edit <tag> --draft=false --prerelease=false"
          echo "========================================"

  # 构建 release 产物
  build-release:
    name: 构建发布 (${{ matrix.platform }})
    needs: [ci-gate, security-gate, frontend-gate, version-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          # macos-13(Intel)runner 常年 queued 超时,仅保留 macos-latest(Apple Silicon)
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60  # 跨平台 Tauri LTO 编译可能 40-60min,防止挂起耗尽 runner 分钟
    steps:
      - uses: actions/checkout@v7

      - name: 安装系统依赖(Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      - name: 安装前端依赖
        working-directory: frontend
        run: bun install

      - uses: tauri-apps/tauri-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SEC-013: Tauri updater ed25519 签名(本地密钥对,私钥入 GH secret)
          # 缺失时 tauri-action 跳过 .sig 生成,不报错
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tachyon ${{ github.ref_name }}'
          releaseBody: |
            ## Tachyon ${{ github.ref_name }}

            ### 安装
            下载对应平台的安装包：
            - **Windows**: `.msi` 安装包
            - **macOS**: `.dmg` 安装包
            - **Linux**: `.deb` / `.AppImage`

            ### 变更
            详见 Git 历史和 PR 描述。
          releaseDraft: true
          prerelease: false
          projectPath: crates/tachyon-app
          # 产物同时作为 workflow artifact 上传,供后续 install-smoke / publish-release
          # 通过 actions/download-artifact 下载。默认 false 时产物只上传到 Release,
          # 后续 job 用 download-artifact pattern: tachyon-* 会下载到 0 个文件。
          uploadWorkflowArtifacts: true

  # 所有平台构建完成且门禁通过后,将 draft release 发布为 public
  publish-release:
    name: 发布 Release
    needs: [release-gate]
    # workflow_dispatch 干跑模式(dry-run=true)跳过发布,仅验证构建链路
    if: success() && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      # SEC-013: cosign keyless 需 OIDC token 签发权限
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          # tauri-action 的 artifact 命名为 platform-arch-type(如 windows-x64-msi),
          # 无统一前缀,不指定 pattern 下载全部
          path: dist
          merge-multiple: true

      # S-12: 生成 SHA256 校验文件并附加到 release
      - name: 生成 SHA256 校验文件
        shell: bash
        run: |
          cd dist
          for file in *.msi *.deb *.dmg *.AppImage; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
              echo "SHA256 校验文件已生成: $file.sha256"
            fi
          done

      # SEC-013: sigstore cosign keyless 签名(零密钥管理,GH OIDC → Fulcio 短期证书)
      - name: 安装 cosign
        uses: sigstore/cosign-installer@v3

      - name: 对产物进行 sigstore keyless 签名(bundle)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          set -euo pipefail
          cd dist
          for f in *.msi *.deb *.dmg *.AppImage; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle "$f.bundle" "$f"
            echo "已签名: $f -> $f.bundle"
          done

      - name: 上传签名 bundle 到 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          cd dist
          for b in *.bundle; do
            [ -f "$b" ] || continue
            gh release upload "$TAG" "$b" --repo "${{ github.repository }}" --clobber
          done

      - name: 将 draft release 发布为 public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "所有平台构建完成,发布 release $TAG"

          # 上传 SHA256 校验文件到 release
          cd dist
          for sha_file in *.sha256; do
            if [ -f "$sha_file" ]; then
              # 审计 SEC-013:校验文件上传失败必须阻断公开发布
              gh release upload "$TAG" "$sha_file" --repo "${{ github.repository }}" --clobber
            fi
          done

          gh release edit "$TAG" --draft=false --repo "${{ github.repository }}"
          echo "Release $TAG 已公开发布"
