name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 完整 CI 门禁: release 必须在所有 CI 检查通过后才能构建
  ci-gate:
    name: CI 门禁检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖(Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@v1.20.0

      - name: 格式检查
        run: cargo fmt --all -- --check

      - name: Clippy 零告警
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 安装 cargo-nextest
        run: cargo binstall -y --force cargo-nextest

      - name: 运行测试(nextest, 失败重试 2 次)
        run: cargo nextest run --all --retries 2

      - name: 文档构建(零警告)
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      # SRE-001: 覆盖率检查门禁
      - name: 安装 nightly 工具链(覆盖率)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: 运行覆盖率检查(核心 crate >= 90%)
        # 覆盖率口径: 排除协议层(需外部网络)、tachyon-app(需 Tauri 运行时)、tachyon-p2sp(原型)
        run: |
          cargo llvm-cov -p tachyon-core -p tachyon-engine -p tachyon-store \
            -p tachyon-io -p tachyon-crypto -p tachyon-scheduler \
            --fail-under-lines 90 --summary-only

      # SRE-002: Miri 检查门禁
      - name: 安装 nightly 工具链(Miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: 初始化 Miri
        run: cargo miri setup

      - name: Miri 检测 tachyon-core
        run: cargo miri test -p tachyon-core --lib -- --skip test_validate_save_path --skip proptests

      - name: Miri 检测 tachyon-io (非平台特定代码)
        run: cargo miri test -p tachyon-io --lib -- --skip iocp --skip iouring --skip pipeline --skip tokio_file --skip winio --skip write_pipeline

  # 安全审计门禁
  security-gate:
    name: 安全审计门禁
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@v1.20.0
      - name: 安装 cargo-deny
        run: cargo binstall -y --force cargo-deny
      - name: cargo deny 检查
        run: cargo deny check
      - name: 安装 cargo-audit
        run: cargo binstall -y --force cargo-audit
      - name: cargo audit 检查
        run: cargo audit

  # 前端门禁
  frontend-gate:
    name: 前端构建门禁
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: 安装前端依赖
        working-directory: frontend
        run: bun install
      # SRE-003: 前端安全审计门禁
      - name: 前端依赖安全审计
        working-directory: frontend
        run: npx npm audit --audit-level=high
      - name: TypeScript 类型检查
        working-directory: frontend
        run: bun run typecheck
      - name: ESLint 检查
        working-directory: frontend
        run: bun run lint
      - name: 前端单元测试
        working-directory: frontend
        run: bun run test
      - name: 前端构建
        working-directory: frontend
        run: bun run build

  # 版本一致性检查
  version-check:
    name: 版本一致性检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检查 tag 与各配置文件版本一致
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag 版本: ${TAG_VERSION}"

          # Cargo.toml workspace version
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "Cargo.toml 版本: ${CARGO_VERSION}"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Cargo.toml 版本不一致: tag=v${TAG_VERSION}, Cargo.toml=${CARGO_VERSION}"
            exit 1
          fi

          # tauri.conf.json version
          TAURI_VERSION=$(grep '"version"' crates/tachyon-app/tauri.conf.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "tauri.conf.json 版本: ${TAURI_VERSION}"
          if [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::tauri.conf.json 版本不一致: tag=v${TAG_VERSION}, tauri.conf.json=${TAURI_VERSION}"
            exit 1
          fi

          # frontend/package.json version
          FRONTEND_VERSION=$(grep '"version"' frontend/package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "frontend/package.json 版本: ${FRONTEND_VERSION}"
          if [ "$TAG_VERSION" != "$FRONTEND_VERSION" ]; then
            echo "::error::frontend/package.json 版本不一致: tag=v${TAG_VERSION}, package.json=${FRONTEND_VERSION}"
            exit 1
          fi

          echo "所有版本一致: ${TAG_VERSION}"

  # 安装冒烟测试:验证构建产物可安装且二进制可执行
  # 注意: Tauri GUI 应用需要 display server,CI 无头环境无法验证窗口启动,
  # 因此仅验证安装文件存在且非零大小,以及 CLI --version 可用(如果支持)
  install-smoke:
    name: 安装冒烟测试 (${{ matrix.platform }})
    needs: build-release
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    continue-on-error: true  # CI 无头环境缺少 display server,GUI 验证可能失败
    steps:
      - uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: tachyon-*${{ matrix.target }}*
          path: dist
          merge-multiple: true

      - name: 验证产物存在且非零大小(硬性要求)
        shell: bash
        run: |
          echo "=== 构建产物列表 ==="
          find dist -type f -ls 2>/dev/null || ls -laR dist/

          # S-08: 产物存在性检查为硬性要求,不因 CI 环境限制而跳过
          found=0
          for ext in msi deb dmg AppImage; do
            files=$(find dist -name "*.$ext" -size +0c 2>/dev/null || true)
            if [ -n "$files" ]; then
              echo "找到 $ext 安装包: $files"
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::未找到非零大小的安装包,构建产物缺失或损坏"
            exit 1
          fi

      - name: Windows 安装验证
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Write-Host "安装 MSI: $($msi.FullName)"
            # 仅验证文件可被 msiexec 识别,不执行静默安装(CI 无 display server)
            $output = msiexec /a "$($msi.FullName)" /qb TARGETDIR="$env:RUNNER_TEMP\msi-validate" 2>&1
            if ($LASTEXITCODE -eq 0 -or $LASTEXITCODE -eq 3010) {
              Write-Host "MSI 管理安装验证通过"
              # 检查安装目录中有可执行文件
              $exe = Get-ChildItem -Path "$env:RUNNER_TEMP\msi-validate" -Filter "tachyon*.exe" -Recurse | Select-Object -First 1
              if ($exe) {
                Write-Host "找到可执行文件: $($exe.FullName)"
              } else {
                Write-Host "::warning::管理安装中未找到 tachyon 可执行文件"
              }
            } else {
              Write-Host "::warning::MSI 管理安装返回退出码 $LASTEXITCODE (CI 无 display server,属预期行为)"
            }
          } else {
            Write-Host "::warning::未找到 MSI 安装包"
          }

      - name: Linux 安装验证
        if: runner.os == 'Linux'
        shell: bash
        run: |
          deb=$(find dist -name "*.deb" -size +0c | head -1)
          if [ -n "$deb" ]; then
            echo "验证 DEB: $deb"
            # dpkg-deb 可在不安装的情况下检查包结构
            dpkg-deb --info "$deb" && echo "DEB 包元数据验证通过" || echo "::warning::DEB 包元数据验证失败"
            dpkg-deb --contents "$deb" && echo "DEB 包内容验证通过" || echo "::warning::DEB 包内容验证失败"
          else
            echo "::warning::未找到 DEB 安装包"
          fi

          appimage=$(find dist -name "*.AppImage" -size +0c | head -1)
          if [ -n "$appimage" ]; then
            echo "验证 AppImage: $appimage"
            chmod +x "$appimage"
            # AppImage --appimage-help 不需要 display server
            "$appimage" --appimage-help 2>&1 | head -5 || echo "::warning::AppImage 验证失败(CI 环境,可忽略)"
          fi

      - name: macOS 安装验证
        if: runner.os == 'macOS'
        shell: bash
        run: |
          dmg=$(find dist -name "*.dmg" -size +0c | head -1)
          if [ -n "$dmg" ]; then
            echo "验证 DMG: $dmg"
            # hdiutil attach 需要 sudo 权限,CI 中可能受限
            # 改为验证 DMG 文件结构可被解析
            hdiutil imageinfo "$dmg" 2>&1 | head -20 && echo "DMG 镜像信息验证通过" || echo "::warning::DMG 验证失败(CI 环境,可忽略)"
          else
            echo "::warning::未找到 DMG 安装包"
          fi

  # 发布门禁:所有检查(含安装冒烟)通过后才将 draft release 变为 public
  release-gate:
    name: 发布门禁
    needs: [install-smoke]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: 发布门禁通过
        run: |
          echo "所有门禁检查通过:"
          echo "  - CI 门禁 (格式/Clippy/测试/覆盖率/Miri)"
          echo "  - 安全审计门禁 (deny/audit)"
          echo "  - 前端构建门禁 (类型检查/Lint/测试/构建)"
          echo "  - 版本一致性检查"
          echo "  - 安装冒烟测试"
          echo ""
          echo "Release 将从 draft 变为 public"

  # 发布失败时自动回滚:将当前 release 标记为 pre-release
  rollback-on-failure:
    name: 发布回滚
    if: failure()
    needs: [build-release, install-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: 标记当前 release 为 pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "发布流程失败,将 release $TAG 标记为 pre-release"
          gh release edit "$TAG" --prerelease --repo "${{ github.repository }}"
          echo "::warning::Release $TAG 已标记为 pre-release,需人工审查后手动发布"

      - name: 输出回滚说明
        run: |
          echo "========================================"
          echo "发布回滚报告"
          echo "========================================"
          echo "Tag: ${GITHUB_REF#refs/tags/}"
          echo "状态: 已标记为 pre-release"
          echo ""
          echo "后续步骤:"
          echo "1. 检查失败的 job 日志,定位问题"
          echo "2. 修复问题后推送新 tag 或重新运行 workflow"
          echo "3. 验证通过后,手动取消 pre-release 标记:"
          echo "   gh release edit <tag> --draft=false --prerelease=false"
          echo "========================================"

  # 构建 release 产物
  build-release:
    name: 构建发布 (${{ matrix.platform }})
    needs: [ci-gate, security-gate, frontend-gate, version-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖(Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      - name: 安装前端依赖
        working-directory: frontend
        run: bun install

      - uses: tauri-apps/tauri-action@v0.5.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tachyon ${{ github.ref_name }}'
          releaseBody: |
            ## Tachyon ${{ github.ref_name }}

            ### 安装
            下载对应平台的安装包：
            - **Windows**: `.msi` 安装包
            - **macOS**: `.dmg` 安装包
            - **Linux**: `.deb` / `.AppImage`

            ### 变更
            详见 Git 历史和 PR 描述。
          releaseDraft: true
          prerelease: false
          projectPath: crates/tachyon-app

  # 所有平台构建完成且门禁通过后,将 draft release 发布为 public
  publish-release:
    name: 发布 Release
    needs: [release-gate]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: tachyon-*"
          path: dist
          merge-multiple: true

      # S-12: 生成 SHA256 校验文件并附加到 release
      - name: 生成 SHA256 校验文件
        shell: bash
        run: |
          cd dist
          for file in *.msi *.deb *.dmg *.AppImage; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
              echo "SHA256 校验文件已生成: $file.sha256"
            fi
          done

      - name: 将 draft release 发布为 public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "所有平台构建完成,发布 release $TAG"

          # 上传 SHA256 校验文件到 release
          cd dist
          for sha_file in *.sha256; do
            if [ -f "$sha_file" ]; then
              gh release upload "$TAG" "$sha_file" --repo "${{ github.repository }}" || true
            fi
          done

          gh release edit "$TAG" --draft=false --repo "${{ github.repository }}"
          echo "Release $TAG 已公开发布"
